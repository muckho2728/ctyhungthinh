services:
  # ─── PostgreSQL Database ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: coffee_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coffee_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-coffee_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-StrongPassword123!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - coffee_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coffee_user} -d ${POSTGRES_DB:-coffee_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: coffee_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-RedisPassword123!}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - coffee_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-RedisPassword123!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ASP.NET Core ────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: coffee_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=${POSTGRES_HOST:-postgres};Port=${POSTGRES_PORT:-5432};Database=${POSTGRES_DB:-coffee_analytics};Username=${POSTGRES_USER:-coffee_user};Password=${POSTGRES_PASSWORD:-StrongPassword123!}"
      Redis__ConnectionString: "${REDIS_HOST:-redis}:${REDIS_PORT:-6379},password=${REDIS_PASSWORD:-RedisPassword123!}"
      TwelveData__ApiKey: ${TWELVEDATA_API_KEY}
      TwelveData__BaseUrl: ${TWELVEDATA_BASE_URL:-https://api.twelvedata.com}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-CoffeeAnalyticsPlatform}
      Jwt__Audience: ${JWT_AUDIENCE:-CoffeeAnalyticsUsers}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
      Jwt__RefreshExpiryDays: ${JWT_REFRESH_EXPIRY_DAYS:-7}
      MlService__BaseUrl: ${ML_SERVICE_URL:-http://ml-service:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coffee_net
    expose:
      - "5000"

  # ─── ML Service Python FastAPI ───────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: coffee_ml
    restart: unless-stopped
    environment:
      PORT: 8000
    networks:
      - coffee_net
    expose:
      - "8000"

  # ─── Frontend React + Vite ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_SIGNALR_URL: /hub
    container_name: coffee_frontend
    restart: unless-stopped
    networks:
      - coffee_net
    expose:
      - "80"

  # ─── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: coffee_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    networks:
      - coffee_net

volumes:
  postgres_data:
  redis_data:

networks:
  coffee_net:
    driver: bridge
